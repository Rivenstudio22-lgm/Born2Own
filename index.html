<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Born2Own | Respect, Discipline, Loyalty</title>
    <style>
        :root { 
            --primary-color: #ffffff; 
            --bg-color: #000000; 
            --accent-color: #25d366; 
            --card-bg: #111111; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-color); 
            color: var(--primary-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
        }
        
        /* HEADER - A BARRA DO TOPO */
        header { 
            padding: 15px 5%; 
            background: #000000; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between; /* Isso joga o logo pra esquerda e o botão pra direita */
            align-items: center;
        }
        header img { height: 40px; }
        
        /* BOTÃO SOBRE NÓS (O QUE TU MARCASTE EM VERMELHO) */
        .btn-about {
            color: white;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid white;
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-about:hover { background: white; color: black; }

        /* BANNER (A ÁREA CASTANHA) */
        .banner-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .banner-img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
            border: 1px solid #333;
        }

        .hero { padding: 40px 20px; }
        .hero h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 30px; }
        
        .btn-buy { 
            background: #fff; 
            color: #000; 
            padding: 18px 40px; 
            border-radius: 5px; 
            font-weight: bold; 
            text-decoration: none; 
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-buy:hover { background: #ccc; }

        /* GALERIA DE PRODUTOS */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 25px; 
            padding: 20px; 
            max-width: 1200px; 
            margin: 0 auto 100px; 
        }
        .item { 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 10px; 
            transition: 0.3s;
            border: 1px solid #222;
        }
        .item:hover { transform: translateY(-5px); border-color: #444; }
        .item img { width: 100%; height: 320px; object-fit: cover; border-radius: 5px; margin-bottom: 15px; }
        .item h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .wpp-float { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            background: var(--accent-color); 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            z-index: 1000; 
        }
        .wpp-float img { width: 35px; }
    </style>
</head>
<body>

    <header>
        <!-- Logo na Esquerda -->
        <img src="logoazul.jpeg" alt="Born2Own Logo">
        
        <!-- Botão SOBRE NÓS na Direita (Círculo Vermelho) -->
        <a href="https://wa.me" class="btn-about">SOBRE NÓS</a>
    </header>

    <!-- BANNER (ÁREA CASTANHA) -->
    <div class="banner-container">
        <img src="thebest.jpeg" class="banner-img" alt="Banner Principal">
    </div>

    <section class="hero">
        <h1>NASCIDO PARA POSSUIR.</h1>
        <a href="https://wa.me" class="btn-buy" target="_blank">Comprar via WhatsApp</a>
    </section>

    <section class="grid">
        <div class="item"><img src="chapeus.jpeg"><h3>Coleção Hats</h3></div>
        <div class="item"><img src="manigue.jpeg"><h3>T-Shirt Manigue</h3></div>
        <div class="item"><img src="amalaentao.jpeg"><h3>Drop Amala Então</h3></div>
        <div class="item"><img src="mota.jpeg"><h3>Lifestyle Moto</h3></div>
        <div class="item"><img src="desenho.jpeg"><h3>Born2Own Art</h3></div>
        <div class="item"><img src="celldeherton.jpeg"><h3>Cell Edition</h3></div>
    </section>

    <a href="https://wa.me" class="wpp-float" target="_blank">
        <img src="https://wikimedia.org" alt="WhatsApp">
    </a>

</body>
</html>
