<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Born2Own | Respect, Discipline, Loyalty</title>
    <style>
        :root { 
            --primary-color: #ffffff; 
            --bg-color: #000000; 
            --accent-color: #25d366; 
            --card-bg: #111111; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-color); 
            color: var(--primary-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
        }
        header { 
            padding: 20px; 
            background: rgba(0,0,0,0.9); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #222;
        }
        header img { height: 40px; }
        .hero { padding: 80px 20px; }
        .hero img { width: 180px; margin-bottom: 20px; }
        .hero h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 30px; }
        .btn-buy { 
            background: #fff; 
            color: #000; 
            padding: 18px 40px; 
            border-radius: 5px; 
            font-weight: bold; 
            text-decoration: none; 
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-buy:hover { background: #ccc; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            padding: 20px; 
            max-width: 1000px; 
            margin: 0 auto 100px; 
        }
        .item { 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 10px; 
            transition: transform 0.3s;
        }
        .item:hover { transform: translateY(-5px); }
        .item img { width: 100%; border-radius: 5px; margin-bottom: 15px; }
        .item h3 { font-size: 1.1rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .wpp-float { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            background: var(--accent-color); 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            z-index: 1000; 
        }
        .wpp-float img { width: 35px; }
    </style>
</head>
<body>

    <header>
        <img src="logobranco.JPEGFILE.jpeg" alt="Born2Own Logo">
    </header>

    <section class="hero">
        <img src="logo.JPEG.File.jpeg" alt="Born2Own Principal">
        <h1>NASCIDO PARA POSSUIR.</h1>
        <a href="https://wa.me" class="btn-buy" target="_blank">Comprar via WhatsApp</a>
    </section>

    <section class="grid">
        <div class="item">
            <img src="bone.JPEG.FILE.jpeg" alt="Boné Born2Own">
            <h3>Trucker Tag Black/White</h3>
        </div>
        <div class="item">
            <img src="camiseta.JPEG.FILE.jpeg" alt="Camiseta Born2Own">
            <h3>T-Shirt Respect Goth</h3>
        </div>
    </section>

    <a href="https://wa.me 866847549" class="wpp-float" target="_blank">
        <img src="https://wikimedia.org" alt="WhatsApp Icon">
    </a>

</body>
</html>
