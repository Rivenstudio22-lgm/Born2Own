<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Born2Own | Respect, Discipline, Loyalty</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary-color: #ffffff; --bg-color: #000000; --accent-color: #25d366; --card-bg: #111111; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--primary-color); font-family: 'Inter', sans-serif; text-align: center; }
        header { padding: 20px; background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 1000; }
        header img { height: 50px; }
        .hero { padding: 60px 20px; }
        .hero h1 { font-size: 3rem; font-weight: 900; margin: 20px 0; }
        .btn-buy { background: #fff; color: #000; padding: 15px 30px; border-radius: 10px; font-weight: 900; text-decoration: none; display: inline-block; margin: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px; max-width: 1200px; margin: 0 auto; }
        .item { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #222; }
        .item img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .wpp-float { position: fixed; bottom: 30px; right: 30px; background: var(--accent-color); width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 1000; }
    </style>
</head>
<body>

    <!-- Imagens configuradas para .JPEG em maiúsculas -->
    <header><img src="logo.JPEG" alt="Born2Own"></header>

    <section class="hero">
        <img src="logo.JPEG" style="width: 200px;" alt="Logo principal">
        <h1>NASCIDO PARA POSSUIR.</h1>
        <a href="https://wa.me" class="btn-buy">COMPRAR VIA WHATSAPP</a>
    </section>

    <section class="grid">
        <div class="item">
            <img src="bone.JPEG" alt="Boné Born2own">
            <h3>Trucker Tag Black/White</h3>
        </div>
        <div class="item">
            <img src="camiseta.JPEG" alt="Camiseta Born2own">
            <h3>T-Shirt Respect Goth</h3>
        </div>
    </section>

    <a href="https://wa.me" class="wpp-float" target="_blank">
        <img src="https://wikimedia.org" width="30" alt="WhatsApp">
    </a>

</body>
</html>
