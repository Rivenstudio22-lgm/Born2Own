<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Born2Own | Respect, Discipline, Loyalty</title>
    <style>
        :root { --primary-color: #ffffff; --bg-color: #000000; --accent-color: #25d366; --card-bg: #111111; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--primary-color); font-family: 'Segoe UI', sans-serif; text-align: center; }
        
        header { 
            padding: 15px 5%; 
            background: #000; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid #222;
        }
        .brand-text { font-weight: 900; letter-spacing: 1px; font-size: 0.9rem; }
        header img { height: 35px; }
        .btn-menu { color: #fff; text-decoration: none; border: 1px solid #fff; padding: 5px 15px; border-radius: 5px; font-size: 0.8rem; }

        .banner-container { width: 100%; max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .banner-img { width: 100%; border-radius: 10px; border: 1px solid #333; }

        .cta-section { padding: 30px 20px; }
        .btn-buy { background: #fff; color: #000; padding: 15px 35px; border-radius: 5px; font-weight: 900; text-decoration: none; text-transform: uppercase; display: inline-block; }

        /* TABELA DE PREÇOS */
        .prices-section { padding: 40px 20px; background: #0a0a0a; margin: 20px 0; border-top: 1px solid #222; border-bottom: 1px solid #222; }
        .prices-section h2 { margin-bottom: 20px; font-size: 1.5rem; }
        .price-item { font-size: 1.2rem; margin: 10px 0; color: #ccc; }
        .price-item span { color: #fff; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto 80px; }
        .item { background: var(--card-bg); padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .item img { width: 100%; height: 300px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
        
        .wpp-float { position: fixed; bottom: 30px; right: 30px; background: var(--accent-color); width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .wpp-float img { width: 30px; }
    </style>
</head>
<body>

    <header>
        <span class="brand-text">NASCIDO PARA POSSUIR</span>
        <img src="logoazul.jpeg" alt="Logo">
        <a href="#precos" class="btn-menu">SOBRE NÓS</a>
    </header>

    <div class="banner-container">
        <img src="thebest.jpeg" class="banner-img">
    </div>

    <section class="cta-section">
        <a href="https://wa.me" class="btn-buy">COMPRAR VIA WHATSAPP</a>
    </section>

    <section id="precos" class="prices-section">
        <h2>TABELA DE PREÇOS</h2>
        <p class="price-item">Chapéus (Hats): <span>850 MT</span></p>
        <p class="price-item">Camisetas (T-Shirts): <span>2.500 MT</span></p>
    </section>

    <section class="grid">
        <div class="item"><img src="chapeus.jpeg"><h3>Coleção Hats</h3></div>
        <div class="item"><img src="manigue.jpeg"><h3>T-Shirt Manigue</h3></div>
        <div class="item"><img src="amalaentao.jpeg"><h3>Drop Amala Então</h3></div>
        <div class="item"><img src="mota.jpeg"><h3>Lifestyle Moto</h3></div>
        <div class="item"><img src="desenho.jpeg"><h3>Born2Own Art</h3></div>
        <div class="item"><img src="celldeherton.jpeg"><h3>Cell Edition</h3></div>
    </section>

    <a href="https://wa.me" class="wpp-float" target="_blank">
        <img src="https://wikimedia.org">
    </a>

</body>
</html>
