<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Born2Own | Respect, Discipline, Loyalty</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary-color: #ffffff; --bg-color: #000000; --accent-color: #25d366; --card-bg: #111111; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--primary-color); font-family: 'Inter', sans-serif; }
        header { padding: 20px; display: flex; justify-content: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; }
        header img { height: 50px; }
        .hero { padding: 60px 20px; text-align: center; }
        .hero h1 { font-size: 3rem; font-weight: 900; margin: 20px 0; }
        .hero p { color: #888; margin-bottom: 30px; }
        .cta-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .btn-buy { background: #fff; color: #000; padding: 15px 30px; border-radius: 10px; font-weight: 900; text-decoration: none; }
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 40px 20px; max-width: 1100px; margin: 0 auto; }
        .item { background: var(--card-bg); border-radius: 15px; padding: 20px; border: 1px solid #222; }
        .item img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .wpp-btn { position: fixed; bottom: 30px; right: 30px; background: var(--accent-color); width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpeg" alt="Born2Own">
    </header>

    <section class="hero">
        <img src="logo.jpeg" style="width: 200px;" alt="Logo Born2Own">
        <h1>NASCIDO PARA POSSUIR.</h1>
        <div class="cta-container">
            <a href="#produtos" class="btn-buy">VER COLEÇÃO</a>
            <a href="https://wa.me" class="btn-buy" style="background: transparent; color: #fff; border: 2px solid #fff;">WHATSAPP</a>
        </div>
    </section>

    <section id="produtos" class="grid-produtos">
        <div class="item">
            <img src="bone.jpeg" alt="Boné">
            <h3>Trucker Tag Black/White</h3>
        </div>
        <div class="item">
            <img src="camiseta.jpeg" alt="Camiseta">
            <h3>T-Shirt Respect Goth</h3>
        </div>
    </section>

    <a href="https://wa.me" class="wpp-btn" target="_blank">
        <img src="https://wikimedia.org" width="30">
    </a>

</body>
</html>
